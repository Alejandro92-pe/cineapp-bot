<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp Perú</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #contenido {
            padding-bottom: 80px; /* igual o un poco más que el footer */
}
        body {
            background: #0a0a0f;
            color: white;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd966;
        }
        
        .badge {
            background: #0000ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        /* Buscador */
        .buscador {
            background: #1e1e2a;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .buscador input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .buscador input::placeholder {
            color: #666;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        
        .tab {
            background: #1e1e2a;
            padding: 8px 20px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .tab.activo {
            background: #0004ff;
            color: rgb(255, 255, 255);
        }
        
        /* Grid de películas */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
        }
        
        @media (min-width: 400px) and (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
        }
        .tarjeta {  
            background: #1e1e2a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tarjeta:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .tarjeta-imagen {
            height: auto;
            background: #2a2a35;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .tarjeta-info {
            padding: 12px;
        }
        
        .tarjeta-titulo {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 11px;
        }
        
        .tarjeta-detalle {
            font-size: 8px;
            color: #aaa;
        }
        
        /* Membresías */
        .planes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .plan {
            background: #1e1e2a;
            padding: 22px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .plan-info {
            flex: 1;
            padding-right: 10px;
        }
        
        .plan-nombre {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .plan-duracion {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .plan-precio {
            font-size: 20px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .btn-comprar {
            background: #ffd966;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Pedidos */
        .pedidos-form {
            background: #1e1e2a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .pedidos-form input,
        .pedidos-form select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #2a2a35;
            border: none;
            border-radius: 8px;
            color: white;
        }
        
        .btn-pedir {
            background: #ffd966;
            color: black;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

.paginacion-contenedor {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.page-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: #fff;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

.page-btn:hover {
    background: #374151;
}

.page-btn.active {
    background: #f97316;
    font-weight: bold;
}

.page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.dots {
    align-self: center;
    padding: 0 5px;
    color: #999;
}
        
        /* Perfil */
        .perfil-card {
            background: #1e1e2a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .perfil-item {
            margin: 10px 0;
            padding: 10px;
            background: #2a2a35;
            border-radius: 8px;
        }
        
        /* Footer */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #0f172a;
    border-top: 1px solid #1e293b;
    z-index: 1000;
}

.footer-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    color: #64748b;
    cursor: pointer;
    transition: 0.2s;
}

.footer-item .icon {
    width: 22px;
    height: 22px;
    fill: currentColor;
    margin-bottom: 4px;
}

.footer-item.activo {
    color: #f97316;
}

.footer-item:hover {
    color: #ffffff;
}
        
        .tarjeta-imagen img {
             width: 100%;
             aspect-ratio: 2 / 3;
             object-fit: cover;
             border-radius: 10px;
         }

        /* Utilidades */
        .text-center { text-align: center; }
        .p-20 { padding: 20px; }
        .mt-20 { margin-top: 20px; }
        .text-gris { color: #666; }
    </style>

    <style>
    /* tus estilos actuales */

    /* ===== NUEVOS ESTILOS MEMBRESÍAS ===== */

    .plan-precio {
        font-size: 22px;
        font-weight: bold;
        color: #ffd966;
        margin-top: 6px;
    }

    .precio-pen {
        font-size: 12px;
        color: #aaa;
        margin-left: 8px;
    }

    .botones-plan {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
        width: 100%;
    }

    .btn-comprar {
        background: #0004ff;
    color: #00ff40;
    padding: 14px 18px;
    border-radius: 14px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    width: 100%;
    font-size: 15px;
    transition: all 0.3s ease;
    margin-top: 8px;
}

    .btn-comprar.tarjeta {
        background: #000000;
    }

    .btn-sub {
        font-size: 11px;
        font-weight: normal;
        margin-top: 4px;
        opacity: 0.8;
    }

    .info-compra {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    text-align: center;
}

.btn-verificar {
    background: #1eff00;
    color: rgb(0, 0, 0);
    padding: 12px;
    border-radius: 12px;
    border: none;
    width: 100%;
    margin-top: 20px;
}

.logo img {
    height: 38px;
    width: auto;
    display: block;
}

.estado-pendiente {
    color: #f59e0b;
    background: rgba(245, 158, 11, 0.1);
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 12px;
}

.estado-entregado {
    color: #10b981;
    background: rgba(16, 185, 129, 0.1);
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 12px;
}

.pedido-item {
    margin-bottom: 10px;
    transition: all 0.3s;
}

.pedido-item:hover {
    background: rgba(255,255,255,0.05);
}

.admin-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    padding: 10px;
    background: var(--bg-secondary);
    border-radius: 10px;
}

.admin-tabs .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
}

.admin-tabs .tab.activo {
    background: var(--accent-color);
    color: white;
}

.lista-pedidos-admin {
    max-height: 70vh;
    overflow-y: auto;
    padding-right: 5px;
}

.lista-pedidos-admin .perfil-item {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.lista-pedidos-admin .perfil-item:hover {
    transform: translateX(5px);
    background: var(--bg-hover);
}

/* Scrollbar personalizado */
.lista-pedidos-admin::-webkit-scrollbar {
    width: 5px;
}

.lista-pedidos-admin::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

.lista-pedidos-admin::-webkit-scrollbar-thumb {
    background: var(--accent-color);
    border-radius: 5px;
}


@media (max-width: 600px) {
    .plan {
        flex-direction: column;
    }

    .plan-info {
        margin-bottom: 14px;
    }
}

@media (max-width: 600px) {
    .btn-comprar {
        padding: 10px;
        font-size: 14px;
    }
}


</style>

</head>
<body>
    <div class="header">
        <div class="logo">
    <img src="static/logo-que-hay-live.webp" alt="Que Hay Live">
</div>  
      <div class="badge" id="badge">Cargando...</div>
    </div>
    <div id="contenido"></div>

    <div class="footer">

    <div class="footer-item activo" data-vista="inicio">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 10L12 3L21 10V21H14V14H10V21H3V10Z"/>
        </svg>
        <span>Inicio</span>
    </div>

    <div class="footer-item" data-vista="membresias">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 1L15 8H22L17 12L19 19L12 15L5 19L7 12L2 8H9L12 1Z"/>
        </svg>
        <span>Membresías</span>
    </div>

    <div class="footer-item" data-vista="pedidos">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M6 2H18L21 7V22H3V7L6 2Z"/>
        </svg>
        <span>Pedidos</span>
    </div>

    <div class="footer-item" data-vista="perfil">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 12C15 12 18 14 18 17V19H6V17C6 14 9 12 12 12ZM12 2C14 2 16 4 16 6C16 8 14 10 12 10C10 10 8 8 8 6C8 4 10 2 12 2Z"/>
        </svg>
        <span>Perfil</span>
    </div>

</div>

    <script src="/static/app.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  window.Telegram.WebApp.ready();
  // Opcional: personalizar el botón de cierre, colores, etc.
</script>
</body>
</html>
