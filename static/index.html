        * {
            margin: 0;

        #contenido {

}
        body {

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: auto;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd966;

        .badge {
            background: #0000ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        /* Buscador */
        .buscador {
            background: #1e1e2a;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            margin: auto;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .buscador input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .buscador input::placeholder {
            color: #666;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            margin: auto;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;

        .tab {
            background: #1e1e2a;
            padding: 8px 20px;
            border-radius: 10px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .tab.activo {
            background: #0004ff;
            color: rgb(255, 255, 255);
        }
        
        /* Grid de películas */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            width: 100%;
            max-width: 1200px;
            margin: auto;
        }
        
        @media (min-width: 400px) and (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
        }
        .tarjeta {  
            background: #1e1e2a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;

        .tarjeta:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);

        .btn-comprar {

            color: rgb(255, 255, 255);
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Pedidos */
        .pedidos-form {
            background: #1e1e2a;
            padding: 20px;
            border-radius: 12px;

            max-width: 600px;

            border: none;
            border-radius: 8px;
            color: white;

        .btn-pedir {
            background: #f97316;
            color: black;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .tarjeta-imagen img {

/* ===== REPRODUCTOR MODAL MEJORADO ===== */
.modal-reproductor {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 100000;
    display: none;
    flex-direction: column;
}

.reproductor-contenedor {
    flex: 1;
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

#iframeReproductor {
    width: 100%;
    height: calc(100% - 44px); /* Mismo alto que el botón */
    border: none;
    background: #000;
    display: block;
}

/* Botón cerrar: esquina superior derecha, pequeño y semitransparente */
.reproductor-cerrar-bottom {
    position: relative;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100002;
    height: 44px;
    background: rgba(15, 15, 15, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    padding: 0 20px;
    transition: background 0.2s;
}

.reproductor-cerrar-bottom:hover,
.reproductor-cerrar-bottom:active {
    background: rgba(180, 0, 0, 0.85);
}

.reproductor-cerrar-bottom svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

.reproductor-cerrar-bottom svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

.reproductor-cerrar-bottom:hover {
    background: rgba(200, 0, 0, 0.7);
}

/* Auto-ocultar el botón después de 3s de inactividad */
.reproductor-cerrar-bottom.oculto {
    opacity: 0.15;
}

@keyframes scaleIn {
    from { transform:scale(0.9); opacity:0; }
    to { transform:scale(1); opacity:1; }
}
